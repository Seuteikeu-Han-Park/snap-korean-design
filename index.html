<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LifeVocab — Design</title>
  <link rel="stylesheet" href="assets/shell.css" />
</head>
<body>
  <div class="app">
    <nav class="nav">
      <div class="nav__brand"><i data-lucide="camera"></i> LifeVocab</div>
      <div class="nav__tagline">사진으로 찍고, 생활 속 단어를 바로 배우는 앱<br />디자인 시스템 & 화면</div>

      <div class="nav__section">디자인 시스템</div>
      <a class="nav__link" href="#/system" data-route="system"><i data-lucide="palette"></i> 토큰 & 컴포넌트</a>

      <div class="nav__section">화면</div>
      <a class="nav__link" href="#/capture" data-route="capture"><span class="num">1</span> 촬영</a>
      <a class="nav__link" href="#/log" data-route="log"><span class="num">2</span> 로그</a>
      <a class="nav__link" href="#/result" data-route="result"><span class="num">3</span> 결과</a>
      <a class="nav__link" href="#/review" data-route="review"><span class="num">4</span> 복습</a>
    </nav>

    <main class="content is-page">
      <!-- page mode: full iframe (design system) -->
      <iframe id="pageFrame" class="content__frame" title="page"></iframe>
      <!-- screen mode: phone frame -->
      <div class="viewport-phone phone">
        <div class="phone__notch"></div>
        <iframe id="screenFrame" class="phone__viewport" title="screen"></iframe>
      </div>
    </main>
  </div>

  <!-- phone frame styles needed inside the shell -->
  <link rel="stylesheet" href="assets/components.css" />
  <script src="assets/glyphs.js" defer></script>

  <script>
    const routes = {
      system: { type: "page", src: "design-system.html" },
      capture: { type: "screen", src: "screens/capture.html" },
      log: { type: "screen", src: "screens/log.html" },
      result: { type: "screen", src: "screens/result.html" },
      review: { type: "screen", src: "screens/review.html" },
    };
    function render() {
      let key = location.hash.replace(/^#\/?/, "") || "system";
      if (!routes[key]) key = "system";
      const r = routes[key];
      const content = document.querySelector(".content");
      const isScreen = r.type === "screen";
      content.classList.toggle("is-screen", isScreen);
      content.classList.toggle("is-page", !isScreen);
      const frame = document.getElementById(isScreen ? "screenFrame" : "pageFrame");
      if (frame.getAttribute("src") !== r.src) frame.setAttribute("src", r.src);
      document.querySelectorAll(".nav__link").forEach((a) =>
        a.classList.toggle("is-active", a.dataset.route === key)
      );
    }
    window.addEventListener("hashchange", render);
    window.addEventListener("DOMContentLoaded", render);
  </script>
</body>
</html>
