<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Snap Korean · 촬영</title>
  <link rel="stylesheet" href="../assets/components.css" />
  <style> html,body{height:100%} body{display:flex} .screen{flex:1} </style>
</head>
<body>
  <div class="screen">
    <div class="screen__topbar"><span class="screen__step">1단계 · 오늘의 한 장</span></div>
    <div class="screen__body stack-lg">
      <div>
        <h1 class="headline">오늘 본 것을<br />찍어보세요</h1>
        <p class="muted" style="margin-top:var(--space-sm)">저녁상, 강아지, 산책길 — 무엇이든 좋아요.</p>
      </div>
      <div class="photo photo--dashed" style="height:300px">📷</div>
    </div>
    <div class="screen__bottom">
      <button class="btn">📸 &nbsp;사진 찍기</button>
      <button class="btn btn--ghost">갤러리에서 고르기</button>
    </div>
  </div>
</body>
</html>
