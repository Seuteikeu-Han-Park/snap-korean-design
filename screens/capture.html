<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LifeVocab · 촬영</title>
  <link rel="stylesheet" href="../assets/components.css" />
  <style> html,body{height:100%} body{display:flex} .screen{flex:1} </style>
</head>
<body>
  <div class="screen" data-camera>
    <div class="statusbar">
      <span>9:41</span>
      <span class="statusbar__icons">
        <i data-lucide="signal-high"></i><i data-lucide="wifi"></i><i data-lucide="battery-full"></i>
      </span>
    </div>

    <div class="appbar">
      <button class="icon-btn" aria-label="뒤로"><i data-lucide="arrow-left"></i></button>
      <span class="appbar__step">1단계 · 사물 촬영</span>
    </div>
    <div class="steps" style="padding:0 var(--space-lg) var(--space-md)">
      <span class="steps__dot is-active"></span>
      <span class="steps__dot"></span>
      <span class="steps__dot"></span>
      <span class="steps__dot"></span>
    </div>

    <div class="screen__body">
      <div class="stack-sm">
        <h1 class="headline">눈앞의 사물을<br />찍어보세요</h1>
        <p class="muted">천장 조명, 컵, 가방, 창문처럼 지금 보이는 물건이면 충분해요.</p>
      </div>

      <div class="viewfinder" style="margin-top:var(--space-md)">
        <div class="photo photo--dashed" style="height:148px;font-size:48px;color:var(--color-primary)">
          <i data-lucide="camera"></i>
        </div>
        <div class="viewfinder__flash" data-flash></div>
      </div>

      <div class="spacer"></div>

      <p class="caption" style="text-align:center;margin-bottom:var(--space-sm)">
        인식 모드 · <b data-mode-label style="color:var(--color-primary-dark)">자동</b>
      </p>
      <div class="camera">
        <div class="camera__pointer"></div>
        <div class="dial" data-dial role="radiogroup" aria-label="촬영 모드">
          <span class="dial__slot"></span>
          <button class="dial__opt" role="radio" data-mode="자동">자동</button>
          <button class="dial__opt" role="radio" data-mode="사물">사물</button>
          <button class="dial__opt" role="radio" data-mode="인물">인물</button>
          <button class="dial__opt" role="radio" data-mode="음식">음식</button>
          <button class="dial__opt" role="radio" data-mode="풍경">풍경</button>
          <button class="dial__opt" role="radio" data-mode="글자">글자</button>
        </div>
        <button class="shutter" data-shutter aria-label="사진 찍기">
          <span class="shutter__core"><i data-lucide="camera"></i></span>
        </button>
      </div>

      <div class="spacer"></div>
    </div>

    <div class="screen__bottom">
      <button class="btn btn--ghost"><i data-lucide="images"></i> 사진에서 가져오기</button>
    </div>
  </div>

  <script src="../assets/dial.js" defer></script>
  <script src="../assets/glyphs.js" defer></script>
</body>
</html>
