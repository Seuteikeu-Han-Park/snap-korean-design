<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LifeVocab · 결과</title>
  <link rel="stylesheet" href="../assets/components.css" />
  <style> html,body{height:100%} body{display:flex} .screen{flex:1} </style>
</head>
<body>
  <div class="screen">
    <div class="statusbar">
      <span>9:41</span>
      <span class="statusbar__icons">
        <i data-lucide="signal-high"></i><i data-lucide="wifi"></i><i data-lucide="battery-full"></i>
      </span>
    </div>

    <div class="appbar">
      <button class="icon-btn" aria-label="뒤로"><i data-lucide="arrow-left"></i></button>
      <span class="appbar__step">3단계 · 인식 결과</span>
    </div>
    <div class="steps" style="padding:0 var(--space-lg) var(--space-md)">
      <span class="steps__dot is-done"></span>
      <span class="steps__dot is-done"></span>
      <span class="steps__dot is-active"></span>
      <span class="steps__dot"></span>
    </div>

    <div class="screen__body stack-md">
      <div class="photo" style="height:172px;font-size:72px">
        💡
        <span class="photo__tag"><i data-lucide="sparkles"></i> 방금 인식됨</span>
      </div>

      <div class="row">
        <span class="chip chip--noun">ceiling light</span>
        <span class="chip chip--conj">천장 조명</span>
      </div>

      <p class="expression">ceiling light</p>

      <div class="card card--hint">
        <p class="body" style="font-size:var(--text-label);color:var(--color-primary-dark)">
          <i data-lucide="volume-2"></i> 발음: <b>/ˈsiːlɪŋ laɪt/</b><br />
          예문: <b>The ceiling light is very bright.</b>
        </p>
      </div>

      <div class="row">
        <span class="badge badge--success">정확도 92%</span>
        <span class="badge">실내 사물</span>
      </div>

      <div class="spacer"></div>
    </div>

    <div class="screen__bottom">
      <button class="btn"><i data-lucide="bookmark"></i> 저장하고 학습</button>
      <button class="btn btn--ghost"><i data-lucide="rotate-ccw"></i> 다시 찍기</button>
    </div>
  </div>

  <script src="../assets/glyphs.js" defer></script>
</body>
</html>
