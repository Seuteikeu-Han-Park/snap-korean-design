<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Snap Korean · 발음 연습</title>
  <link rel="stylesheet" href="../assets/components.css" />
  <style> html,body{height:100%} body{display:flex} .screen{flex:1} </style>
</head>
<body>
  <div class="screen">
    <div class="screen__topbar"><span class="screen__step">4단계 · 소리내어</span></div>
    <div class="screen__body stack-lg" style="text-align:center">
      <div>
        <p class="expression">강아지가<br />귀여워 보여요</p>
        <p class="muted" style="margin-top:var(--space-sm)">버튼을 누르고 따라 말해보세요</p>
      </div>
      <div class="mic">🎙️</div>
      <div class="card card--accent" style="text-align:left">
        <p style="font-size:var(--text-h2);font-weight:var(--weight-bold);color:var(--color-success)">좋아요! 👏</p>
        <p class="muted" style="font-size:var(--text-label);margin-top:var(--space-xs)">
          또박또박 잘 말했어요. ‘귀여워’ 발음이 자연스러워요.
        </p>
      </div>
    </div>
    <div class="screen__bottom">
      <button class="btn">다음 표현 →</button>
      <button class="btn btn--ghost">🔁 다시 듣기</button>
    </div>
  </div>
</body>
</html>
