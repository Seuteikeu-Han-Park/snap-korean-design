<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Snap Korean · 내 표현</title>
  <link rel="stylesheet" href="../assets/components.css" />
  <style> html,body{height:100%} body{display:flex} .screen{flex:1} </style>
</head>
<body>
  <div class="screen">
    <div class="screen__topbar"><span class="screen__step">3단계 · 내 표현</span></div>
    <div class="screen__body stack-md">
      <div class="photo" style="height:160px;font-size:52px">🐶</div>
      <div class="row">
        <span class="chip chip--noun">강아지</span>
        <span class="chip chip--conj">~어 보여요</span>
      </div>
      <p class="expression">강아지가<br />귀여워 보여요</p>
      <div class="card card--hint">
        <p class="muted" style="font-size:var(--text-label);color:var(--color-primary-dark)">
          💡 오늘 배운 활용형 <b>‘~어 보여요’</b> 로 만든 <b>내 문장</b>이에요.
          명사만 외우는 게 아니라, 바로 말이 됩니다.
        </p>
      </div>
    </div>
    <div class="screen__bottom">
      <button class="btn">🔊 &nbsp;발음 연습하기</button>
      <button class="btn btn--ghost">이 표현 저장</button>
    </div>
  </div>
</body>
</html>
